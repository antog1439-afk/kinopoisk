<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINOPOISK RUS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ============================================================
           БАЗА
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100vh;
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* ============================================================
           ДИНАМИЧЕСКИЙ ГРАДИЕНТ
           ============================================================ */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -2;
            transition: background 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: rgba(10, 10, 15, 0.75);
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
        }

        /* ============================================================
           КОНТЕЙНЕР
           ============================================================ */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px 30px;
            position: relative;
            z-index: 1;
        }

        /* ============================================================
           ШАПКА
           ============================================================ */
        .header {
            text-align: center;
            padding: 24px 0 16px;
            position: relative;
        }

        .logo {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.2;
            background: linear-gradient(135deg, #ffffff 30%, rgba(255, 255, 255, 0.4));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo .highlight {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 300% 300%;
            animation: gradientShift 5s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 2.5px;
            font-weight: 300;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .time-indicator {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.1);
            letter-spacing: 1px;
            margin-top: 8px;
            font-weight: 300;
        }

        /* ============================================================
           ВКЛАДКИ (фильмы / сериалы / книги)
           ============================================================ */
        .tabs {
            display: flex;
            gap: 6px;
            margin: 12px 0 16px;
            justify-content: center;
        }

        .tab-btn {
            padding: 8px 20px;
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.25);
            border: 1px solid rgba(255, 255, 255, 0.03);
            border-radius: 20px;
            font-size: 13px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            letter-spacing: 0.3px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .tab-btn:hover {
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.5);
        }

        .tab-btn.active {
            background: rgba(255, 255, 255, 0.06);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.06);
        }

        /* ============================================================
           ПОИСК
           ============================================================ */
        .search-wrapper {
            display: flex;
            gap: 8px;
            margin: 8px 0 20px;
        }

        .search-input-wrap {
            flex: 1;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            color: rgba(255, 255, 255, 0.15);
            pointer-events: none;
            transition: color 0.3s ease;
        }

        .search-input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            font-size: 15px;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.03);
            color: #ffffff;
            outline: none;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.15);
            font-weight: 300;
            letter-spacing: 0.2px;
        }

        .search-input:focus {
            border-color: rgba(255, 255, 255, 0.12);
            background: rgba(255, 255, 255, 0.05);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.02);
        }

        .search-input:focus ~ .search-icon,
        .search-input:focus + .search-icon {
            color: rgba(255, 255, 255, 0.35);
        }

        .search-btn {
            padding: 13px 22px;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.5);
            border: 1px solid rgba(255, 255, 255, 0.05);
            border-radius: 14px;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            letter-spacing: 0.4px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .search-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.8);
            border-color: rgba(255, 255, 255, 0.08);
        }

        .search-btn:active:not(:disabled) {
            transform: scale(0.96);
        }

        .search-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        /* ============================================================
           ЗАГРУЗКА
           ============================================================ */
        .loader {
            display: none;
            text-align: center;
            padding: 40px 0;
        }

        .loader.active {
            display: block;
            animation: fadeUp 0.35s ease;
        }

        .loader-ring {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255, 255, 255, 0.03);
            border-top: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 50%;
            animation: spin 0.7s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader p {
            color: rgba(255, 255, 255, 0.1);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 1.5px;
        }

        /* ============================================================
           РЕЗУЛЬТАТЫ
           ============================================================ */
        .results {
            display: none;
        }

        .results.active {
            display: block;
            animation: fadeUp 0.45s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-count {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.1);
            margin-bottom: 12px;
            letter-spacing: 1.2px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        /* ============================================================
           КАРТОЧКИ
           ============================================================ */
        .movie-card {
            display: flex;
            gap: 14px;
            padding: 13px;
            background: rgba(255, 255, 255, 0.015);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.025);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardIn 0.45s ease backwards;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .movie-card:nth-child(1) { animation-delay: 0.03s; }
        .movie-card:nth-child(2) { animation-delay: 0.06s; }
        .movie-card:nth-child(3) { animation-delay: 0.09s; }
        .movie-card:nth-child(4) { animation-delay: 0.12s; }
        .movie-card:nth-child(5) { animation-delay: 0.15s; }
        .movie-card:nth-child(6) { animation-delay: 0.18s; }
        .movie-card:nth-child(7) { animation-delay: 0.21s; }
        .movie-card:nth-child(8) { animation-delay: 0.24s; }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(14px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .movie-card:hover {
            background: rgba(255, 255, 255, 0.03);
            border-color: rgba(255, 255, 255, 0.05);
            transform: translateY(-2px);
        }

        .movie-card:active {
            transform: scale(0.98);
        }

        .movie-poster {
            width: 64px;
            height: 96px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.015);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            transition: transform 0.35s ease;
        }

        .movie-card:hover .movie-poster {
            transform: scale(1.02);
        }

        .movie-poster.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.05);
            background: rgba(255, 255, 255, 0.015);
        }

        .movie-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }

        .movie-title {
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.2px;
            line-height: 1.3;
        }

        .movie-title .year {
            font-weight: 300;
            color: rgba(255, 255, 255, 0.12);
            font-size: 13px;
            margin-left: 5px;
        }

        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 3px 10px;
            margin: 3px 0 5px;
            font-size: 10.5px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 0.2px;
        }

        .movie-meta-item {
            display: inline;
        }

        .movie-rating {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 1px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.35);
            width: fit-content;
            margin: 2px 0 4px;
            border: 1px solid rgba(255, 255, 255, 0.02);
        }

        .movie-rating.high {
            color: #6bcb77;
            border-color: rgba(107, 203, 119, 0.08);
            background: rgba(107, 203, 119, 0.03);
        }

        .movie-rating.medium {
            color: #ffd93d;
            border-color: rgba(255, 217, 61, 0.08);
            background: rgba(255, 217, 61, 0.03);
        }

        .movie-rating.low {
            color: #ff6b6b;
            border-color: rgba(255, 107, 107, 0.08);
            background: rgba(255, 107, 107, 0.03);
        }

        .movie-desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.1);
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
            font-weight: 300;
        }

        .movie-link {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            margin-top: 5px;
            padding: 3px 0;
            color: rgba(255, 255, 255, 0.1);
            text-decoration: none;
            font-size: 10.5px;
            font-weight: 300;
            letter-spacing: 0.6px;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
            align-self: flex-start;
        }

        .movie-link:hover {
            color: rgba(255, 255, 255, 0.3);
            border-bottom-color: rgba(255, 255, 255, 0.04);
        }

        /* ============================================================
           ОШИБКА
           ============================================================ */
        .error {
            text-align: center;
            padding: 40px 20px;
            display: none;
            animation: fadeUp 0.4s ease;
        }

        .error.active {
            display: block;
        }

        .error .icon {
            font-size: 40px;
            display: block;
            opacity: 0.2;
            margin-bottom: 10px;
        }

        .error h3 {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.3);
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .error p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.08);
            font-weight: 300;
        }

        /* ============================================================
           ПРИВЕТСТВИЕ
           ============================================================ */
        .welcome {
            text-align: center;
            padding: 50px 20px;
            animation: fadeUp 0.6s ease;
        }

        .welcome .icon {
            font-size: 48px;
            display: block;
            opacity: 0.08;
            margin-bottom: 10px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .welcome h2 {
            font-size: 17px;
            color: rgba(255, 255, 255, 0.1);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .welcome p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.04);
            font-weight: 300;
            margin-top: 3px;
        }

        /* ============================================================
           ЗАКРЫТЬ
           ============================================================ */
        .close-btn {
            display: none;
            width: 100%;
            max-width: 400px;
            margin: 14px auto 0;
            padding: 11px;
            background: rgba(255, 255, 255, 0.015);
            color: rgba(255, 255, 255, 0.08);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            font-size: 12px;
            font-weight: 300;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1.2px;
            text-align: center;
        }

        .close-btn.active {
            display: block;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.025);
            color: rgba(255, 255, 255, 0.15);
        }

        /* ============================================================
           АДАПТИВ
           ============================================================ */
        @media (min-width: 500px) {
            .movie-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .container {
                padding: 20px 24px 30px;
            }
            .logo {
                font-size: 36px;
            }
        }

        @media (min-width: 768px) {
            .container {
                padding: 30px 32px 40px;
            }
            .logo {
                font-size: 42px;
            }
            .movie-poster {
                width: 74px;
                height: 110px;
            }
            .movie-title {
                font-size: 17px;
            }
        }

        @media (min-width: 1024px) {
            .movie-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .container {
                max-width: 900px;
            }
            .logo {
                font-size: 48px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ФОН ===== -->
    <div class="gradient-bg" id="gradientBg"></div>
    <div class="gradient-overlay"></div>

    <!-- ===== ОСНОВНОЙ КОНТЕЙНЕР ===== -->
    <div class="container">

        <!-- ===== ШАПКА ===== -->
        <div class="header">
            <div class="logo">
                KINO<span class="highlight">POISK</span> RUS
            </div>
            <div class="subtitle">фильмы · сериалы · книги</div>
            <div class="time-indicator" id="timeIndicator">⚡ сейчас</div>
        </div>

        <!-- ===== ВКЛАДКИ ===== -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="movies" onclick="switchTab('movies')">🎬 Фильмы</button>
            <button class="tab-btn" data-tab="series" onclick="switchTab('series')">📺 Сериалы</button>
            <button class="tab-btn" data-tab="books" onclick="switchTab('books')">📚 Книги</button>
        </div>

        <!-- ===== ПОИСК ===== -->
        <div class="search-wrapper">
            <div class="search-input-wrap">
                <span class="search-icon">⌕</span>
                <input
                    type="text"
                    class="search-input"
                    id="searchInput"
                    placeholder="введите название..."
                    autofocus
                >
            </div>
            <button class="search-btn" id="searchBtn">найти</button>
        </div>

        <!-- ===== ЗАГРУЗКА ===== -->
        <div class="loader" id="loader">
            <div class="loader-ring"></div>
            <p>поиск</p>
        </div>

        <!-- ===== РЕЗУЛЬТАТЫ ===== -->
        <div class="results" id="results">
            <div class="results-count" id="resultsCount"></div>
            <div class="movie-grid" id="movieGrid"></div>
        </div>

        <!-- ===== ОШИБКА ===== -->
        <div class="error" id="error">
            <span class="icon">◌</span>
            <h3>ничего не найдено</h3>
            <p>попробуйте другое название</p>
        </div>

        <!-- ===== ПРИВЕТСТВИЕ ===== -->
        <div class="welcome" id="welcome">
            <span class="icon">◈</span>
            <h2>введите название</h2>
            <p>и нажмите «найти»</p>
        </div>

        <!-- ===== ЗАКРЫТЬ ===== -->
        <button class="close-btn" id="closeBtn" onclick="closeApp()">✕ закрыть</button>

    </div>

    <!-- ============================================================= -->
    <!-- ===== JAVASCRIPT ===== -->
    <!-- ============================================================= -->
    <script>
        // =============================================================
        // 1. TELEGRAM WEB APP
        // =============================================================
        var tg = window.Telegram.WebApp;
        tg.expand();

        if (tg.platform === 'android' || tg.platform === 'ios') {
            document.getElementById('closeBtn').classList.add('active');
        }

        // =============================================================
        // 2. СМЕНА ЦВЕТА КАЖДЫЙ ЧАС
        // =============================================================
        var gradients = [
            'linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a0a0a 50%, #2e1a0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a1a1a 50%, #0a2e1a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a1a2e 50%, #0a2e3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #2e0a3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #2e1a0a 50%, #3a2e0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a1a0a 50%, #2e2e0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a1a0a 50%, #0a2e0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a0a2e 50%, #1a0a3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #2e0a1a 50%, #3a0a2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a2e1a 50%, #0a3a2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a2e0a 50%, #2e3a0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #2e0a0a 50%, #3a1a0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a0a2e 50%, #0a1a3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a0a1a 50%, #2e0a2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a1a2e 50%, #0a2e3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #2e1a0a 50%, #3a2e1a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a1a1a 50%, #0a2e2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #2e0a3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #2e0a1a 50%, #3a0a2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a1a0a 50%, #2e2e0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a2e1a 50%, #0a3a2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a0a2e 50%, #1a0a3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #2e0a0a 50%, #3a1a0a 100%)'
        ];

        function updateGradient() {
            var now = new Date();
            var hour = now.getHours();
            var gradient = gradients[hour] || gradients[0];
            document.getElementById('gradientBg').style.background = gradient;

            var timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('timeIndicator').textContent = '⚡ ' + timeStr;
        }

        updateGradient();
        setInterval(updateGradient, 3600000);

        document.addEventListener('visibilitychange', function() {
            if (!document.hidden) updateGradient();
        });

        // =============================================================
        // 3. API
        // =============================================================
        var API_KEY = '92TKXCB-6GNMBMP-J6SSQDN-3R4VVHG';
        var API_URL = 'https://api.poiskkino.dev/v1.4/movie/search';

        // =============================================================
        // 4. СОСТОЯНИЕ
        // =============================================================
        var currentTab = 'movies';

        // =============================================================
        // 5. ЭЛЕМЕНТЫ
        // =============================================================
        var searchInput = document.getElementById('searchInput');
        var searchBtn = document.getElementById('searchBtn');
        var loader = document.getElementById('loader');
        var results = document.getElementById('results');
        var movieGrid = document.getElementById('movieGrid');
        var resultsCount = document.getElementById('resultsCount');
        var error = document.getElementById('error');
        var welcome = document.getElementById('welcome');

        // =============================================================
        // 6. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        // =============================================================
        function switchTab(tab) {
            currentTab = tab;
            document.querySelectorAll('.tab-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });

            // Меняем placeholder
            var placeholders = {
                'movies': 'введите название фильма...',
                'series': 'введите название сериала...',
                'books': 'введите название книги...'
            };
            searchInput.placeholder = placeholders[tab] || 'введите название...';

            // Очищаем результаты
            results.classList.remove('active');
            error.classList.remove('active');
            movieGrid.innerHTML = '';
            resultsCount.textContent = '';
            welcome.style.display = 'block';
            searchInput.value = '';
            searchInput.focus();
        }

        // =============================================================
        // 7. ПОИСК
        // =============================================================
        function searchMovies(query) {
            query = query.trim();
            if (!query) {
                tg.showAlert('введите название');
                return;
            }

            // Если вкладка "Книги" — используем имитацию поиска книг
            if (currentTab === 'books') {
                searchBooks(query);
                return;
            }

            loader.classList.add('active');
            searchBtn.disabled = true;
            results.classList.remove('active');
            error.classList.remove('active');
            welcome.style.display = 'none';
            movieGrid.innerHTML = '';
            resultsCount.textContent = '';

            // Для сериалов добавляем фильтр по типу
            var url = API_URL + '?query=' + encodeURIComponent(query);
            if (currentTab === 'series') {
                url += '&type=series';
            }

            fetch(url, {
                method: 'GET',
                headers: {
                    'X-API-KEY': API_KEY,
                    'Content-Type': 'application/json'
                }
            })
            .then(function(response) {
                if (response.status === 401) throw new Error('неверный ключ API');
                if (response.status === 429) throw new Error('слишком много запросов');
                if (!response.ok) throw new Error('ошибка ' + response.status);
                return response.json();
            })
            .then(function(data) {
                if (!data.docs || data.docs.length === 0) {
                    error.classList.add('active');
                    return;
                }
                displayMovies(data.docs, currentTab);
            })
            .catch(function(err) {
                console.error('Ошибка:', err);
                tg.showAlert('❌ ' + err.message);
                error.classList.add('active');
            })
            .finally(function() {
                loader.classList.remove('active');
                searchBtn.disabled = false;
            });
        }

        // =============================================================
        // 8. ПОИСК КНИГ (имитация через внешний API)
        // =============================================================
        function searchBooks(query) {
            loader.classList.add('active');
            searchBtn.disabled = true;
            results.classList.remove('active');
            error.classList.remove('active');
            welcome.style.display = 'none';
            movieGrid.innerHTML = '';
            resultsCount.textContent = '';

            // Используем Open Library API для поиска книг
            var url = 'https://openlibrary.org/search.json?q=' + encodeURIComponent(query) + '&limit=12';

            fetch(url)
            .then(function(response) {
                if (!response.ok) throw new Error('ошибка ' + response.status);
                return response.json();
            })
            .then(function(data) {
                if (!data.docs || data.docs.length === 0) {
                    error.classList.add('active');
                    return;
                }
                displayBooks(data.docs);
            })
            .catch(function(err) {
                console.error('Ошибка:', err);
                tg.showAlert('❌ ' + err.message);
                error.classList.add('active');
            })
            .finally(function() {
                loader.classList.remove('active');
                searchBtn.disabled = false;
            });
        }

        // =============================================================
        // 9. ОТОБРАЖЕНИЕ КНИГ
        // =============================================================
        function displayBooks(books) {
            results.classList.add('active');
            resultsCount.textContent = books.length + ' книг';
            movieGrid.innerHTML = '';

            for (var i = 0; i < books.length; i++) {
                var book = books[i];
                var card = document.createElement('div');
                card.className = 'movie-card';
                card.style.animationDelay = (0.03 + i * 0.03) + 's';

                var title = book.title || 'без названия';
                var author = book.author_name ? book.author_name.slice(0, 2).join(', ') : 'автор неизвестен';
                var year = book.first_publish_year || '';
                var coverId = book.cover_i || null;
                var coverUrl = coverId ? 'https://covers.openlibrary.org/b/id/' + coverId + '-M.jpg' : null;

                var posterHtml;
                if (coverUrl) {
                    posterHtml = '<img class="movie-poster" src="' + coverUrl + '" alt="' + title + '" loading="lazy" onerror="this.className=\'movie-poster empty\'; this.textContent=\'📚\'">';
                } else {
                    posterHtml = '<div class="movie-poster empty">📚</div>';
                }

                var yearHtml = year ? '<span class="year">' + year + '</span>' : '';

                card.innerHTML =
                    posterHtml +
                    '<div class="movie-info">' +
                        '<div>' +
                            '<div class="movie-title">' + title + ' ' + yearHtml + '</div>' +
                            '<div class="movie-meta">' +
                                '<span class="movie-meta-item">✍️ ' + author + '</span>' +
                            '</div>' +
                        '</div>' +
                        '<a href="https://openlibrary.org' + (book.key || '') + '" class="movie-link" target="_blank">→ открыть</a>' +
                    '</div>';

                card.addEventListener('click', function(e) {
                    if (!e.target.closest('.movie-link')) {
                        var link = 'https://openlibrary.org' + (book.key || '');
                        tg.openLink(link);
                    }
                });

                movieGrid.appendChild(card);
            }
        }

        // =============================================================
        // 10. ОТОБРАЖЕНИЕ ФИЛЬМОВ И СЕРИАЛОВ
        // =============================================================
        function displayMovies(movies, tab) {
            results.classList.add('active');
            var label = tab === 'series' ? 'сериалов' : 'фильмов';
            resultsCount.textContent = movies.length + ' ' + label;
            movieGrid.innerHTML = '';

            for (var i = 0; i < movies.length; i++) {
                var movie = movies[i];
                var card = document.createElement('div');
                card.className = 'movie-card';
                card.style.animationDelay = (0.03 + i * 0.03) + 's';

                var title = movie.name || movie.alternativeName || 'без названия';
                var year = movie.year || '';
                var rating = movie.rating?.kp || movie.rating?.imdb || null;
                var genres = movie.genres ? movie.genres.map(function(g) { return g.name; }).slice(0, 3).join(', ') : '—';
                var countries = movie.countries ? movie.countries.map(function(c) { return c.name; }).slice(0, 2).join(', ') : '—';
                var description = movie.description || movie.shortDescription || '';
                var poster = movie.poster?.url || movie.poster?.previewUrl || null;
                var link = 'https://www.kinopoisk.ru/film/' + movie.id + '/';

                var ratingClass = '';
                var ratingText = '—';
                if (rating !== null) {
                    ratingText = rating.toFixed(1);
                    if (rating >= 7) ratingClass = 'high';
                    else if (rating >= 5) ratingClass = 'medium';
                    else ratingClass = 'low';
                }

                var posterHtml;
                if (poster) {
                    posterHtml = '<img class="movie-poster" src="' + poster + '" alt="' + title + '" loading="lazy" onerror="this.className=\'movie-poster empty\'; this.textContent=\'' + (tab === 'series' ? '📺' : '🎬') + '\'">';
                } else {
                    posterHtml = '<div class="movie-poster empty">' + (tab === 'series' ? '📺' : '🎬') + '</div>';
                }

                var ratingHtml = '';
                if (rating !== null) {
                    ratingHtml = '<span class="movie-rating ' + ratingClass + '">★ ' + ratingText + '</span>';
                }

                var yearHtml = year ? '<span class="year">' + year + '</span>' : '';
                var descHtml = description ? '<div class="movie-desc">' + description + '</div>' : '';

                card.innerHTML =
                    posterHtml +
                    '<div class="movie-info">' +
                        '<div>' +
                            '<div class="movie-title">' + title + ' ' + yearHtml + '</div>' +
                            '<div class="movie-meta">' +
                                '<span class="movie-meta-item">' + genres + '</span>' +
                                '<span class="movie-meta-item">' + countries + '</span>' +
                            '</div>' +
                            ratingHtml +
                            descHtml +
                        '</div>' +
                        '<a href="' + link + '" class="movie-link" target="_blank">→ кинопоиск</a>' +
                    '</div>';

                card.addEventListener('click', function(e) {
                    if (!e.target.closest('.movie-link')) {
                        tg.openLink(link);
                    }
                });

                movieGrid.appendChild(card);
            }
        }

        // =============================================================
        // 11. ОБРАБОТЧИКИ
        // =============================================================
        searchBtn.addEventListener('click', function() {
            searchMovies(searchInput.value);
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchMovies(searchInput.value);
            }
        });

        function closeApp() {
            tg.close();
        }

        console.log('✦ KINOPOISK RUS ✦ (фильмы · сериалы · книги)');
        console.log('✦ цвет обновлён: ' + new Date().toLocaleTimeString('ru-RU'));
    </script>
</body>
</html>
