<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINOPOISK RUS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ============================================================
           БАЗА
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html, body {
            min-height: 100vh;
            background: #0a0a0f;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            color: #ffffff;
            overflow-x: hidden;
        }

        /* ============================================================
           ЦВЕТНОЙ ФОН
           ============================================================ */
        #gradientBg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -2;
            transition: background 1.5s ease;
        }

        body.bg-movies #gradientBg {
            background: radial-gradient(ellipse at center, #1a0a0a 0%, #2d0a0a 20%, #1a0505 40%, #0a0a0f 70%, #0a0a0f 100%);
        }

        body.bg-series #gradientBg {
            background: radial-gradient(ellipse at center, #0a0a1a 0%, #0a0a2d 20%, #05051a 40%, #0a0a0f 70%, #0a0a0f 100%);
        }

        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            backdrop-filter: blur(60px);
            -webkit-backdrop-filter: blur(60px);
            transition: background 1.5s ease;
        }

        body.bg-movies .gradient-overlay {
            background: rgba(255, 107, 107, 0.06);
        }

        body.bg-series .gradient-overlay {
            background: rgba(77, 150, 255, 0.06);
        }

        /* ============================================================
           КОНТЕЙНЕР
           ============================================================ */
        .container {
            max-width: 800px;
            margin: 0 auto;
            padding: 20px 16px 30px;
            position: relative;
            z-index: 1;
        }

        /* ============================================================
           ШАПКА
           ============================================================ */
        .header {
            text-align: center;
            padding: 24px 0 16px;
            position: relative;
        }

        .logo {
            font-size: 30px;
            font-weight: 800;
            letter-spacing: -0.5px;
            line-height: 1.2;
            background: linear-gradient(135deg, #ffffff 30%, rgba(255, 255, 255, 0.6));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
        }

        .logo .highlight {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 300% 300%;
            animation: gradientShift 5s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .subtitle {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.35);
            letter-spacing: 2.5px;
            font-weight: 300;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .time-indicator {
            font-size: 10px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 1px;
            margin-top: 8px;
            font-weight: 300;
        }

        /* ============================================================
           ВКЛАДКИ - ТОЛЬКО ИКОНКИ
           ============================================================ */
        .tabs {
            display: flex;
            gap: 16px;
            margin: 12px 0 18px;
            justify-content: center;
            flex-wrap: wrap;
        }

        .tab-btn {
            display: flex;
            align-items: center;
            justify-content: center;
            width: 60px;
            height: 60px;
            padding: 0;
            background: rgba(255, 255, 255, 0.05);
            color: rgba(255, 255, 255, 0.3);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 50%;
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
            position: relative;
            overflow: hidden;
        }

        .tab-btn::before {
            content: '';
            position: absolute;
            inset: 0;
            border-radius: 50%;
            opacity: 0;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .tab-btn:hover::before {
            opacity: 0.6;
        }

        .tab-btn[data-tab="movies"]::before {
            background: linear-gradient(135deg, rgba(255, 107, 107, 0.3), rgba(255, 107, 107, 0.05));
        }

        .tab-btn[data-tab="series"]::before {
            background: linear-gradient(135deg, rgba(77, 150, 255, 0.3), rgba(77, 150, 255, 0.05));
        }

        .tab-btn[data-tab="movies"].active {
            background: rgba(255, 107, 107, 0.2);
            border-color: rgba(255, 107, 107, 0.3);
            box-shadow: 0 4px 30px rgba(255, 107, 107, 0.15);
            transform: translateY(-3px) scale(1.02);
            color: #ff6b6b;
        }

        .tab-btn[data-tab="series"].active {
            background: rgba(77, 150, 255, 0.2);
            border-color: rgba(77, 150, 255, 0.3);
            box-shadow: 0 4px 30px rgba(77, 150, 255, 0.15);
            transform: translateY(-3px) scale(1.02);
            color: #4d96ff;
        }

        .tab-btn:hover {
            transform: translateY(-2px);
        }

        .tab-btn:active {
            transform: scale(0.95);
        }

        .tab-icon {
            width: 28px;
            height: 28px;
            fill: none;
            stroke: currentColor;
            stroke-width: 1.8;
            stroke-linecap: round;
            stroke-linejoin: round;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            position: relative;
            z-index: 1;
        }

        .tab-btn[data-tab="movies"] .tab-icon {
            stroke: rgba(255, 255, 255, 0.25);
        }

        .tab-btn[data-tab="series"] .tab-icon {
            stroke: rgba(255, 255, 255, 0.25);
        }

        .tab-btn[data-tab="movies"].active .tab-icon {
            stroke: #ff6b6b;
            filter: drop-shadow(0 0 20px rgba(255, 107, 107, 0.4));
        }

        .tab-btn[data-tab="series"].active .tab-icon {
            stroke: #4d96ff;
            filter: drop-shadow(0 0 20px rgba(77, 150, 255, 0.4));
        }

        .tab-btn.active::after {
            content: '';
            position: absolute;
            bottom: 6px;
            left: 50%;
            transform: translateX(-50%);
            width: 5px;
            height: 5px;
            border-radius: 50%;
            opacity: 0.7;
            z-index: 1;
        }

        .tab-btn[data-tab="movies"].active::after {
            background: #ff6b6b;
            box-shadow: 0 0 15px rgba(255, 107, 107, 0.4);
        }

        .tab-btn[data-tab="series"].active::after {
            background: #4d96ff;
            box-shadow: 0 0 15px rgba(77, 150, 255, 0.4);
        }

        /* ============================================================
           ПОИСК
           ============================================================ */
        .search-wrapper {
            display: flex;
            gap: 8px;
            margin: 8px 0 20px;
        }

        .search-input-wrap {
            flex: 1;
            position: relative;
        }

        .search-icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 15px;
            color: rgba(255, 255, 255, 0.3);
            pointer-events: none;
            transition: color 0.3s ease;
        }

        .search-input {
            width: 100%;
            padding: 13px 16px 13px 42px;
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            font-size: 15px;
            font-weight: 400;
            background: rgba(255, 255, 255, 0.05);
            color: #ffffff;
            outline: none;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.25);
            font-weight: 300;
            letter-spacing: 0.2px;
        }

        .search-input:focus {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.08);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.05);
        }

        .search-input:focus ~ .search-icon,
        .search-input:focus + .search-icon {
            color: rgba(255, 255, 255, 0.5);
        }

        .search-btn {
            padding: 13px 22px;
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.6);
            border: 1px solid rgba(255, 255, 255, 0.08);
            border-radius: 14px;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.35s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            letter-spacing: 0.4px;
            backdrop-filter: blur(10px);
            -webkit-backdrop-filter: blur(10px);
        }

        .search-btn:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.1);
            color: rgba(255, 255, 255, 0.8);
            border-color: rgba(255, 255, 255, 0.12);
        }

        .search-btn:active:not(:disabled) {
            transform: scale(0.96);
        }

        .search-btn:disabled {
            opacity: 0.25;
            cursor: not-allowed;
        }

        /* ============================================================
           ЗАГРУЗКА
           ============================================================ */
        .loader {
            display: none;
            text-align: center;
            padding: 40px 0;
        }

        .loader.active {
            display: block;
            animation: fadeUp 0.35s ease;
        }

        .loader-ring {
            width: 28px;
            height: 28px;
            border: 2px solid rgba(255, 255, 255, 0.06);
            border-top: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: spin 0.7s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto 10px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loader p {
            color: rgba(255, 255, 255, 0.2);
            font-size: 12px;
            font-weight: 300;
            letter-spacing: 1.5px;
        }

        /* ============================================================
           РЕЗУЛЬТАТЫ
           ============================================================ */
        .results {
            display: none;
        }

        .results.active {
            display: block;
            animation: fadeUp 0.45s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-count {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.25);
            margin-bottom: 12px;
            letter-spacing: 1.2px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 10px;
        }

        /* ============================================================
           КАРТОЧКИ
           ============================================================ */
        .movie-card {
            display: flex;
            gap: 14px;
            padding: 13px;
            background: rgba(255, 255, 255, 0.05);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardIn 0.45s ease backwards;
            backdrop-filter: blur(8px);
            -webkit-backdrop-filter: blur(8px);
        }

        .movie-card:nth-child(1) { animation-delay: 0.03s; }
        .movie-card:nth-child(2) { animation-delay: 0.06s; }
        .movie-card:nth-child(3) { animation-delay: 0.09s; }
        .movie-card:nth-child(4) { animation-delay: 0.12s; }
        .movie-card:nth-child(5) { animation-delay: 0.15s; }
        .movie-card:nth-child(6) { animation-delay: 0.18s; }
        .movie-card:nth-child(7) { animation-delay: 0.21s; }
        .movie-card:nth-child(8) { animation-delay: 0.24s; }

        @keyframes cardIn {
            from { opacity: 0; transform: translateY(14px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .movie-card:hover {
            transform: translateY(-2px);
        }

        .movie-card:active {
            transform: scale(0.98);
        }

        /* Цветные карточки */
        .bg-movies .movie-card {
            background: rgba(255, 107, 107, 0.05);
            border-color: rgba(255, 107, 107, 0.06);
        }

        .bg-movies .movie-card:hover {
            background: rgba(255, 107, 107, 0.08);
            border-color: rgba(255, 107, 107, 0.1);
        }

        .bg-series .movie-card {
            background: rgba(77, 150, 255, 0.05);
            border-color: rgba(77, 150, 255, 0.06);
        }

        .bg-series .movie-card:hover {
            background: rgba(77, 150, 255, 0.08);
            border-color: rgba(77, 150, 255, 0.1);
        }

        .movie-poster {
            width: 64px;
            height: 96px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.03);
            box-shadow: 0 4px 16px rgba(0, 0, 0, 0.3);
            transition: transform 0.35s ease;
        }

        .movie-card:hover .movie-poster {
            transform: scale(1.02);
        }

        .movie-poster.empty {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            color: rgba(255, 255, 255, 0.1);
            background: rgba(255, 255, 255, 0.03);
        }

        .movie-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }

        .movie-title {
            font-size: 15px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.2px;
            line-height: 1.3;
        }

        .movie-title .year {
            font-weight: 300;
            color: rgba(255, 255, 255, 0.4);
            font-size: 13px;
            margin-left: 5px;
        }

        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 3px 10px;
            margin: 3px 0 5px;
            font-size: 10.5px;
            color: rgba(255, 255, 255, 0.4);
            letter-spacing: 0.2px;
        }

        .movie-meta-item {
            display: inline;
        }

        .movie-rating {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 1px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.55);
            width: fit-content;
            margin: 2px 0 4px;
            border: 1px solid rgba(255, 255, 255, 0.06);
        }

        .movie-rating.high {
            color: #6bcb77;
            border-color: rgba(107, 203, 119, 0.2);
            background: rgba(107, 203, 119, 0.08);
        }

        .movie-rating.medium {
            color: #ffd93d;
            border-color: rgba(255, 217, 61, 0.2);
            background: rgba(255, 217, 61, 0.08);
        }

        .movie-rating.low {
            color: #ff6b6b;
            border-color: rgba(255, 107, 107, 0.2);
            background: rgba(255, 107, 107, 0.08);
        }

        .movie-desc {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.35);
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
            font-weight: 300;
        }

        .movie-link {
            display: inline-flex;
            align-items: center;
            gap: 3px;
            margin-top: 5px;
            padding: 3px 0;
            color: rgba(255, 255, 255, 0.3);
            text-decoration: none;
            font-size: 10.5px;
            font-weight: 300;
            letter-spacing: 0.6px;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
            align-self: flex-start;
        }

        .movie-link:hover {
            color: rgba(255, 255, 255, 0.55);
            border-bottom-color: rgba(255, 255, 255, 0.1);
        }

        /* ============================================================
           ОШИБКА
           ============================================================ */
        .error {
            text-align: center;
            padding: 40px 20px;
            display: none;
            animation: fadeUp 0.4s ease;
        }

        .error.active {
            display: block;
        }

        .error .icon {
            font-size: 40px;
            display: block;
            opacity: 0.2;
            margin-bottom: 10px;
        }

        .error h3 {
            font-size: 16px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
            letter-spacing: 0.5px;
            margin-bottom: 4px;
        }

        .error p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
            font-weight: 300;
        }

        /* ============================================================
           ПРИВЕТСТВИЕ
           ============================================================ */
        .welcome {
            text-align: center;
            padding: 50px 20px;
            animation: fadeUp 0.6s ease;
        }

        .welcome .icon {
            font-size: 48px;
            display: block;
            opacity: 0.1;
            margin-bottom: 10px;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .welcome h2 {
            font-size: 17px;
            color: rgba(255, 255, 255, 0.2);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .welcome p {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.08);
            font-weight: 300;
            margin-top: 3px;
        }

        /* ============================================================
           ЗАКРЫТЬ
           ============================================================ */
        .close-btn {
            display: none;
            width: 100%;
            max-width: 400px;
            margin: 14px auto 0;
            padding: 11px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.15);
            border: 1px solid rgba(255, 255, 255, 0.04);
            border-radius: 12px;
            font-size: 12px;
            font-weight: 300;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1.2px;
            text-align: center;
        }

        .close-btn.active {
            display: block;
        }

        .close-btn:hover {
            background: rgba(255, 255, 255, 0.06);
            color: rgba(255, 255, 255, 0.25);
        }

        /* ============================================================
           АДАПТИВ
           ============================================================ */
        @media (min-width: 500px) {
            .movie-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .container {
                padding: 20px 24px 30px;
            }
            .logo {
                font-size: 36px;
            }
        }

        @media (min-width: 768px) {
            .container {
                padding: 30px 32px 40px;
            }
            .logo {
                font-size: 42px;
            }
            .movie-poster {
                width: 74px;
                height: 110px;
            }
            .movie-title {
                font-size: 17px;
            }
        }

        @media (min-width: 1024px) {
            .movie-grid {
                grid-template-columns: repeat(2, 1fr);
            }
            .container {
                max-width: 900px;
            }
            .logo {
                font-size: 48px;
            }
        }

        @media (max-width: 400px) {
            .tab-btn {
                width: 52px;
                height: 52px;
            }
            .tab-icon {
                width: 24px;
                height: 24px;
            }
            .search-btn {
                padding: 13px 16px;
                font-size: 13px;
            }
        }
    </style>
</head>
<body>

    <!-- ===== ФОН ===== -->
    <div id="gradientBg"></div>
    <div class="gradient-overlay"></div>

    <!-- ===== ОСНОВНОЙ КОНТЕЙНЕР ===== -->
    <div class="container">

        <!-- ===== ШАПКА ===== -->
        <div class="header">
            <div class="logo">
                KINO<span class="highlight">POISK</span> RUS
            </div>
            <div class="subtitle">фильмы · сериалы</div>
            <div class="time-indicator" id="timeIndicator">⚡ сейчас</div>
        </div>

        <!-- ===== ВКЛАДКИ - ТОЛЬКО ИКОНКИ ===== -->
        <div class="tabs">
            <button class="tab-btn active" data-tab="movies" onclick="switchTab('movies')" title="Фильмы">
                <svg class="tab-icon" viewBox="0 0 24 24">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <line x1="8" y1="2" x2="8" y2="6"/>
                    <line x1="16" y1="2" x2="16" y2="6"/>
                    <line x1="2" y1="10" x2="22" y2="10"/>
                    <polygon points="10,13 14,11 14,15 10,13"/>
                </svg>
            </button>

            <button class="tab-btn" data-tab="series" onclick="switchTab('series')" title="Сериалы">
                <svg class="tab-icon" viewBox="0 0 24 24">
                    <rect x="2" y="4" width="20" height="16" rx="2"/>
                    <circle cx="8.5" cy="12" r="2.5"/>
                    <circle cx="15.5" cy="12" r="2.5"/>
                    <line x1="6" y1="2" x2="6" y2="4"/>
                    <line x1="18" y1="2" x2="18" y2="4"/>
                    <line x1="2" y1="8" x2="22" y2="8"/>
                </svg>
            </button>
        </div>

        <!-- ===== ПОИСК ===== -->
        <div class="search-wrapper">
            <div class="search-input-wrap">
                <span class="search-icon">⌕</span>
                <input
                    type="text"
                    class="search-input"
                    id="searchInput"
                    placeholder="введите название фильма..."
                    autofocus
                >
            </div>
            <button class="search-btn" id="searchBtn">найти</button>
        </div>

        <!-- ===== ЗАГРУЗКА ===== -->
        <div class="loader" id="loader">
            <div class="loader-ring"></div>
            <p>поиск</p>
        </div>

        <!-- ===== РЕЗУЛЬТАТЫ ===== -->
        <div class="results" id="results">
            <div class="results-count" id="resultsCount"></div>
            <div class="movie-grid" id="movieGrid"></div>
        </div>

        <!-- ===== ОШИБКА ===== -->
        <div class="error" id="error">
            <span class="icon">◌</span>
            <h3>ничего не найдено</h3>
            <p>попробуйте другое название</p>
        </div>

        <!-- ===== ПРИВЕТСТВИЕ ===== -->
        <div class="welcome" id="welcome">
            <span class="icon">◈</span>
            <h2>введите название</h2>
            <p>и нажмите «найти»</p>
        </div>

        <!-- ===== ЗАКРЫТЬ ===== -->
        <button class="close-btn" id="closeBtn" onclick="closeApp()">✕ закрыть</button>

    </div>

    <!-- ============================================================= -->
    <!-- ===== JAVASCRIPT ===== -->
    <!-- ============================================================= -->
    <script>
        // =============================================================
        // 1. TELEGRAM WEB APP
        // =============================================================
        var tg = window.Telegram.WebApp;
        tg.ready();
        tg.expand();

        if (tg.platform === 'android' || tg.platform === 'ios') {
            document.getElementById('closeBtn').classList.add('active');
        }

        // =============================================================
        // 2. КОНФИГУРАЦИЯ
        // =============================================================
        var KINOPOISK_API_KEY = 'P2RCP6B-3V24Q4W-N7RQSW3-0488PH9';

        console.log('🔑 API ключ установлен:', KINOPOISK_API_KEY ? '✅' : '❌');

        // =============================================================
        // 3. ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        // =============================================================
        var currentTab = 'movies';

        function switchTab(tab) {
            currentTab = tab;
            
            document.querySelectorAll('.tab-btn').forEach(function(btn) {
                btn.classList.toggle('active', btn.dataset.tab === tab);
            });

            document.body.className = 'bg-' + tab;

            var placeholders = {
                'movies': 'введите название фильма...',
                'series': 'введите название сериала...'
            };
            document.getElementById('searchInput').placeholder = placeholders[tab] || 'введите название...';

            document.getElementById('results').classList.remove('active');
            document.getElementById('error').classList.remove('active');
            document.getElementById('movieGrid').innerHTML = '';
            document.getElementById('resultsCount').textContent = '';
            document.getElementById('welcome').style.display = 'block';
            document.getElementById('searchInput').value = '';
            document.getElementById('searchInput').focus();
        }

        // =============================================================
        // 4. ВРЕМЯ
        // =============================================================
        function updateTime() {
            var now = new Date();
            var timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('timeIndicator').textContent = '⚡ ' + timeStr;
        }

        switchTab('movies');
        updateTime();
        setInterval(updateTime, 10000);

        // =============================================================
        // 5. ЭЛЕМЕНТЫ
        // =============================================================
        var searchInput = document.getElementById('searchInput');
        var searchBtn = document.getElementById('searchBtn');
        var loader = document.getElementById('loader');
        var results = document.getElementById('results');
        var movieGrid = document.getElementById('movieGrid');
        var resultsCount = document.getElementById('resultsCount');
        var error = document.getElementById('error');
        var welcome = document.getElementById('welcome');

        // =============================================================
        // 6. ПОИСК
        // =============================================================
        function search(query) {
            query = query.trim();
            if (!query) {
                tg.showAlert('введите название');
                return;
            }

            loader.classList.add('active');
            searchBtn.disabled = true;
            results.classList.remove('active');
            error.classList.remove('active');
            welcome.style.display = 'none';
            movieGrid.innerHTML = '';
            resultsCount.textContent = '';

            var url = 'https://api.poiskkino.dev/v1.4/movie/search?query=' + encodeURIComponent(query);
            if (currentTab === 'series') {
                url += '&type=series';
            }

            var cleanKey = KINOPOISK_API_KEY.replace(/[^A-Za-z0-9\-]/g, '');

            fetch(url, {
                method: 'GET',
                headers: {
                    'X-API-KEY': cleanKey,
                    'Content-Type': 'application/json'
                }
            })
            .then(function(response) {
                if (response.status === 401) {
                    throw new Error('❌ Неверный API ключ');
                }
                if (response.status === 429) {
                    throw new Error('❌ Слишком много запросов');
                }
                if (!response.ok) {
                    throw new Error('Ошибка ' + response.status);
                }
                return response.json();
            })
            .then(function(data) {
                if (!data.docs || data.docs.length === 0) {
                    error.classList.add('active');
                    return;
                }
                displayMovies(data.docs);
            })
            .catch(function(err) {
                console.error('Ошибка:', err);
                tg.showAlert('❌ ' + err.message);
                error.classList.add('active');
            })
            .finally(function() {
                loader.classList.remove('active');
                searchBtn.disabled = false;
            });
        }

        // =============================================================
        // 7. ОТОБРАЖЕНИЕ
        // =============================================================
        function displayMovies(movies) {
            results.classList.add('active');
            var label = currentTab === 'series' ? 'сериалов' : 'фильмов';
            resultsCount.textContent = movies.length + ' ' + label;
            movieGrid.innerHTML = '';

            for (var i = 0; i < movies.length; i++) {
                var movie = movies[i];
                var card = document.createElement('div');
                card.className = 'movie-card';
                card.style.animationDelay = (0.03 + i * 0.03) + 's';

                var title = movie.name || movie.alternativeName || 'без названия';
                var year = movie.year || '';
                var rating = movie.rating && movie.rating.kp ? movie.rating.kp : null;
                var genres = movie.genres ? movie.genres.map(function(g) { return g.name; }).slice(0, 3).join(', ') : '—';
                var countries = movie.countries ? movie.countries.map(function(c) { return c.name; }).slice(0, 2).join(', ') : '—';
                var description = movie.description || movie.shortDescription || '';
                var poster = movie.poster && movie.poster.url ? movie.poster.url : null;
                var link = 'https://www.kinopoisk.ru/film/' + movie.id + '/';

                var ratingClass = '';
                var ratingText = '—';
                if (rating !== null) {
                    ratingText = rating.toFixed(1);
                    if (rating >= 7) ratingClass = 'high';
                    else if (rating >= 5) ratingClass = 'medium';
                    else ratingClass = 'low';
                }

                var posterHtml;
                if (poster) {
                    posterHtml = '<img class="movie-poster" src="' + poster + '" alt="' + title + '" loading="lazy" onerror="this.className=\'movie-poster empty\'; this.textContent=\'' + (currentTab === 'series' ? '📺' : '🎬') + '\'">';
                } else {
                    posterHtml = '<div class="movie-poster empty">' + (currentTab === 'series' ? '📺' : '🎬') + '</div>';
                }

                var ratingHtml = '';
                if (rating !== null) {
                    ratingHtml = '<span class="movie-rating ' + ratingClass + '">★ ' + ratingText + '</span>';
                }

                var yearHtml = year ? '<span class="year">' + year + '</span>' : '';
                var descHtml = description ? '<div class="movie-desc">' + description + '</div>' : '';

                card.innerHTML =
                    posterHtml +
                    '<div class="movie-info">' +
                        '<div>' +
                            '<div class="movie-title">' + title + ' ' + yearHtml + '</div>' +
                            '<div class="movie-meta">' +
                                '<span class="movie-meta-item">' + genres + '</span>' +
                                '<span class="movie-meta-item">' + countries + '</span>' +
                            '</div>' +
                            ratingHtml +
                            descHtml +
                        '</div>' +
                        '<a href="' + link + '" class="movie-link" target="_blank">→ кинопоиск</a>' +
                    '</div>';

                card.addEventListener('click', function(e) {
                    if (!e.target.closest('.movie-link')) {
                        tg.openLink(link);
                    }
                });

                movieGrid.appendChild(card);
            }
        }

        // =============================================================
        // 8. ОБРАБОТЧИКИ
        // =============================================================
        searchBtn.addEventListener('click', function() {
            search(searchInput.value);
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                search(searchInput.value);
            }
        });

        function closeApp() {
            tg.close();
        }

        console.log('✦ KINOPOISK RUS ✦ (Фильмы + Сериалы)');
        console.log('✦ Вкладка: ' + currentTab);
        console.log('✦ Только иконки без текста!');
    </script>
</body>
</html>
