<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>KINOPOISK RUS</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        /* ============================================================
           БАЗА
           ============================================================ */
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'Segoe UI', Roboto, sans-serif;
            background: #0a0a0f;
            color: #ffffff;
            min-height: 100vh;
            overflow-x: hidden;
            transition: background 1s ease;
        }

        /* ============================================================
           ДИНАМИЧЕСКИЙ ГРАДИЕНТ (меняется каждый час)
           ============================================================ */
        .gradient-bg {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -2;
            transition: background 2s cubic-bezier(0.4, 0, 0.2, 1);
        }

        .gradient-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            z-index: -1;
            background: rgba(10, 10, 15, 0.7);
            backdrop-filter: blur(80px);
        }

        /* ============================================================
           ШАПКА
           ============================================================ */
        .header {
            text-align: center;
            padding: 28px 20px 16px;
            position: relative;
        }

        .header .logo {
            font-size: 32px;
            font-weight: 800;
            letter-spacing: -0.5px;
            background: linear-gradient(135deg, #ffffff 30%, rgba(255, 255, 255, 0.5));
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            text-shadow: 0 0 60px rgba(255, 255, 255, 0.05);
        }

        .header .logo .highlight {
            background: linear-gradient(135deg, #ff6b6b, #ffd93d, #6bcb77, #4d96ff, #9b59b6);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            background-size: 300% 300%;
            animation: gradientShift 6s ease-in-out infinite;
        }

        @keyframes gradientShift {
            0%, 100% { background-position: 0% 50%; }
            50% { background-position: 100% 50%; }
        }

        .header .subtitle {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.25);
            letter-spacing: 2px;
            font-weight: 300;
            text-transform: uppercase;
            margin-top: 4px;
        }

        .header .time-indicator {
            font-size: 11px;
            color: rgba(255, 255, 255, 0.15);
            letter-spacing: 1px;
            margin-top: 8px;
            font-weight: 300;
        }

        /* ============================================================
           ПОИСК
           ============================================================ */
        .search-container {
            display: flex;
            gap: 10px;
            padding: 0 16px;
            margin: 12px 0 20px;
            max-width: 600px;
            margin-left: auto;
            margin-right: auto;
        }

        .search-input-wrapper {
            flex: 1;
            position: relative;
        }

        .search-input-wrapper .icon {
            position: absolute;
            left: 14px;
            top: 50%;
            transform: translateY(-50%);
            font-size: 16px;
            opacity: 0.3;
            pointer-events: none;
            transition: opacity 0.3s ease;
        }

        .search-input {
            width: 100%;
            padding: 14px 16px 14px 44px;
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            font-size: 15px;
            background: rgba(255, 255, 255, 0.04);
            color: #ffffff;
            outline: none;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            backdrop-filter: blur(10px);
            font-weight: 400;
            letter-spacing: 0.2px;
        }

        .search-input::placeholder {
            color: rgba(255, 255, 255, 0.2);
            font-weight: 300;
        }

        .search-input:focus {
            border-color: rgba(255, 255, 255, 0.15);
            background: rgba(255, 255, 255, 0.06);
            box-shadow: 0 0 0 3px rgba(255, 255, 255, 0.03);
        }

        .search-input:focus + .icon,
        .search-input:focus ~ .icon {
            opacity: 0.6;
        }

        /* ===== ТОНКАЯ КНОПКА ПОИСКА ===== */
        .search-button {
            padding: 14px 20px;
            background: rgba(255, 255, 255, 0.04);
            color: rgba(255, 255, 255, 0.7);
            border: 1px solid rgba(255, 255, 255, 0.06);
            border-radius: 14px;
            font-size: 14px;
            font-weight: 400;
            cursor: pointer;
            transition: all 0.4s cubic-bezier(0.4, 0, 0.2, 1);
            white-space: nowrap;
            letter-spacing: 0.5px;
            backdrop-filter: blur(10px);
        }

        .search-button:hover:not(:disabled) {
            background: rgba(255, 255, 255, 0.08);
            color: #ffffff;
            border-color: rgba(255, 255, 255, 0.1);
        }

        .search-button:active:not(:disabled) {
            transform: scale(0.96);
        }

        .search-button:disabled {
            opacity: 0.3;
            cursor: not-allowed;
        }

        /* ============================================================
           ЗАГРУЗКА
           ============================================================ */
        .loading-spinner {
            display: none;
            text-align: center;
            padding: 50px 0;
        }

        .loading-spinner.active {
            display: block;
            animation: fadeUp 0.4s ease;
        }

        .spinner-ring {
            width: 32px;
            height: 32px;
            border: 2px solid rgba(255, 255, 255, 0.04);
            border-top: 2px solid rgba(255, 255, 255, 0.3);
            border-radius: 50%;
            animation: spin 0.8s cubic-bezier(0.4, 0, 0.2, 1) infinite;
            margin: 0 auto 12px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .loading-spinner p {
            color: rgba(255, 255, 255, 0.15);
            font-size: 13px;
            font-weight: 300;
            letter-spacing: 1px;
        }

        /* ============================================================
           РЕЗУЛЬТАТЫ
           ============================================================ */
        .results {
            display: none;
            padding: 0 16px;
            max-width: 1200px;
            margin: 0 auto;
        }

        .results.active {
            display: block;
            animation: fadeUp 0.5s ease;
        }

        @keyframes fadeUp {
            from { opacity: 0; transform: translateY(12px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .results-count {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
            margin-bottom: 14px;
            padding: 0 4px;
            letter-spacing: 1px;
            font-weight: 300;
            text-transform: uppercase;
        }

        .movie-grid {
            display: grid;
            grid-template-columns: 1fr;
            gap: 12px;
        }

        /* ============================================================
           КАРТОЧКИ ФИЛЬМОВ (минималистичные)
           ============================================================ */
        .movie-card {
            display: flex;
            gap: 14px;
            padding: 14px;
            background: rgba(255, 255, 255, 0.02);
            border-radius: 16px;
            border: 1px solid rgba(255, 255, 255, 0.03);
            cursor: pointer;
            transition: all 0.5s cubic-bezier(0.4, 0, 0.2, 1);
            animation: cardSlide 0.5s ease backwards;
            backdrop-filter: blur(10px);
        }

        .movie-card:nth-child(1) { animation-delay: 0.04s; }
        .movie-card:nth-child(2) { animation-delay: 0.08s; }
        .movie-card:nth-child(3) { animation-delay: 0.12s; }
        .movie-card:nth-child(4) { animation-delay: 0.16s; }
        .movie-card:nth-child(5) { animation-delay: 0.20s; }
        .movie-card:nth-child(6) { animation-delay: 0.24s; }

        @keyframes cardSlide {
            from { opacity: 0; transform: translateY(16px) scale(0.97); }
            to { opacity: 1; transform: translateY(0) scale(1); }
        }

        .movie-card:hover {
            background: rgba(255, 255, 255, 0.04);
            border-color: rgba(255, 255, 255, 0.06);
            transform: translateY(-2px);
        }

        .movie-card:active {
            transform: scale(0.98);
        }

        .movie-poster {
            width: 70px;
            height: 105px;
            border-radius: 10px;
            object-fit: cover;
            flex-shrink: 0;
            background: rgba(255, 255, 255, 0.02);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.3);
            transition: transform 0.4s ease;
        }

        .movie-card:hover .movie-poster {
            transform: scale(1.02);
        }

        .movie-poster.placeholder {
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 28px;
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.08);
        }

        .movie-info {
            flex: 1;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            min-width: 0;
        }

        .movie-title {
            font-size: 16px;
            font-weight: 600;
            color: #ffffff;
            letter-spacing: -0.2px;
            line-height: 1.3;
        }

        .movie-title .year {
            font-weight: 300;
            color: rgba(255, 255, 255, 0.15);
            font-size: 14px;
            margin-left: 6px;
        }

        .movie-meta {
            display: flex;
            flex-wrap: wrap;
            gap: 4px 10px;
            margin: 4px 0 6px;
            font-size: 11px;
            color: rgba(255, 255, 255, 0.2);
            letter-spacing: 0.2px;
        }

        .movie-meta-item {
            display: flex;
            align-items: center;
            gap: 3px;
        }

        .movie-rating {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            padding: 2px 10px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 500;
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.5);
            width: fit-content;
            margin: 2px 0 6px;
            border: 1px solid rgba(255, 255, 255, 0.03);
        }

        .movie-rating.high {
            color: #6bcb77;
            border-color: rgba(107, 203, 119, 0.1);
            background: rgba(107, 203, 119, 0.04);
        }

        .movie-rating.medium {
            color: #ffd93d;
            border-color: rgba(255, 217, 61, 0.1);
            background: rgba(255, 217, 61, 0.04);
        }

        .movie-rating.low {
            color: #ff6b6b;
            border-color: rgba(255, 107, 107, 0.1);
            background: rgba(255, 107, 107, 0.04);
        }

        .movie-description {
            font-size: 12px;
            color: rgba(255, 255, 255, 0.15);
            display: -webkit-box;
            -webkit-line-clamp: 1;
            -webkit-box-orient: vertical;
            overflow: hidden;
            line-height: 1.5;
            font-weight: 300;
        }

        /* ===== ТОНКАЯ ССЫЛКА ===== */
        .movie-link {
            display: inline-flex;
            align-items: center;
            gap: 4px;
            margin-top: 6px;
            padding: 4px 0;
            color: rgba(255, 255, 255, 0.15);
            text-decoration: none;
            font-size: 11px;
            font-weight: 300;
            letter-spacing: 0.5px;
            transition: all 0.3s ease;
            border-bottom: 1px solid transparent;
            align-self: flex-start;
        }

        .movie-link:hover {
            color: rgba(255, 255, 255, 0.4);
            border-bottom-color: rgba(255, 255, 255, 0.05);
        }

        /* ============================================================
           ОШИБКА
           ============================================================ */
        .error-message {
            text-align: center;
            padding: 50px 20px;
            display: none;
            animation: fadeUp 0.4s ease;
        }

        .error-message.active {
            display: block;
        }

        .error-message .icon {
            font-size: 48px;
            margin-bottom: 12px;
            display: block;
            opacity: 0.3;
        }

        .error-message h3 {
            font-size: 17px;
            color: rgba(255, 255, 255, 0.4);
            font-weight: 400;
            margin-bottom: 6px;
        }

        .error-message p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.12);
            font-weight: 300;
        }

        /* ============================================================
           ПРИВЕТСТВИЕ
           ============================================================ */
        .welcome-message {
            text-align: center;
            padding: 60px 20px;
            animation: fadeUp 0.6s ease;
        }

        .welcome-message .icon {
            font-size: 56px;
            margin-bottom: 12px;
            display: block;
            opacity: 0.15;
            animation: float 4s ease-in-out infinite;
        }

        @keyframes float {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-6px); }
        }

        .welcome-message h2 {
            font-size: 18px;
            color: rgba(255, 255, 255, 0.15);
            font-weight: 300;
            letter-spacing: 1px;
        }

        .welcome-message p {
            font-size: 13px;
            color: rgba(255, 255, 255, 0.06);
            font-weight: 300;
            max-width: 280px;
            margin: 4px auto 0;
        }

        /* ============================================================
           КНОПКА ЗАКРЫТИЯ
           ============================================================ */
        .close-button {
            display: none;
            width: calc(100% - 32px);
            max-width: 600px;
            margin: 16px auto 0;
            padding: 12px;
            background: rgba(255, 255, 255, 0.02);
            color: rgba(255, 255, 255, 0.1);
            border: 1px solid rgba(255, 255, 255, 0.02);
            border-radius: 12px;
            font-size: 13px;
            font-weight: 300;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
        }

        .close-button.active {
            display: block;
        }

        .close-button:hover {
            background: rgba(255, 255, 255, 0.03);
            color: rgba(255, 255, 255, 0.2);
        }

        /* ============================================================
           АДАПТИВ
           ============================================================ */
        @media (min-width: 600px) {
            .movie-grid { grid-template-columns: repeat(2, 1fr); }
            .search-container { padding: 0 24px; }
            .results { padding: 0 24px; }
            .header .logo { font-size: 38px; }
        }

        @media (min-width: 900px) {
            .movie-grid { grid-template-columns: repeat(2, 1fr); }
            .search-container { padding: 0 32px; }
            .results { padding: 0 32px; }
            .header .logo { font-size: 44px; }
            .header { padding: 40px 20px 20px; }
        }

        @media (min-width: 1200px) {
            .movie-grid { grid-template-columns: repeat(3, 1fr); }
            .search-container { max-width: 700px; }
        }
    </style>
</head>
<body>

    <!-- ===== ФОН ===== -->
    <div class="gradient-bg" id="gradientBg"></div>
    <div class="gradient-overlay"></div>

    <!-- ===== ШАПКА ===== -->
    <div class="header">
        <div class="logo">
            KINO<span class="highlight">POISK</span> RUS
        </div>
        <div class="subtitle">••• кинопоиск в телеграме •••</div>
        <div class="time-indicator" id="timeIndicator">⚡ обновлено сейчас</div>
    </div>

    <!-- ===== ПОИСК ===== -->
    <div class="search-container">
        <div class="search-input-wrapper">
            <span class="icon">⌕</span>
            <input 
                type="text" 
                class="search-input" 
                id="searchInput" 
                placeholder="название фильма..."
                autofocus
            >
        </div>
        <button class="search-button" id="searchButton">найти</button>
    </div>

    <!-- ===== ЗАГРУЗКА ===== -->
    <div class="loading-spinner" id="loadingSpinner">
        <div class="spinner-ring"></div>
        <p>поиск...</p>
    </div>

    <!-- ===== РЕЗУЛЬТАТЫ ===== -->
    <div class="results" id="results">
        <div class="results-count" id="resultsCount"></div>
        <div class="movie-grid" id="movieGrid"></div>
    </div>

    <!-- ===== ОШИБКА ===== -->
    <div class="error-message" id="errorMessage">
        <span class="icon">◌</span>
        <h3>ничего не найдено</h3>
        <p>попробуйте другое название</p>
    </div>

    <!-- ===== ПРИВЕТСТВИЕ ===== -->
    <div class="welcome-message" id="welcomeMessage">
        <span class="icon">◈</span>
        <h2>введите название фильма</h2>
        <p>и нажмите «найти»</p>
    </div>

    <!-- ===== КНОПКА ЗАКРЫТИЯ ===== -->
    <button class="close-button" id="closeButton" onclick="closeApp()">✕ закрыть</button>

    <!-- ============================================================= -->
    <!-- ===== JAVASCRIPT ===== -->
    <!-- ============================================================= -->
    <script>
        // =============================================================
        // 1. TELEGRAM WEB APP
        // =============================================================
        const tg = window.Telegram.WebApp;
        tg.expand();

        if (tg.platform === 'android' || tg.platform === 'ios') {
            document.getElementById('closeButton').classList.add('active');
        }

        // =============================================================
        // 2. СМЕНА ЦВЕТА КАЖДЫЙ ЧАС
        // =============================================================
        const gradients = [
            'linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #0a1a2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a0a0a 50%, #2e1a0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a1a1a 50%, #0a2e1a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a1a2e 50%, #0a2e3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #2e0a3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #2e1a0a 50%, #3a2e0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a1a0a 50%, #2e2e0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a1a0a 50%, #0a2e0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a0a2e 50%, #1a0a3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #2e0a1a 50%, #3a0a2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a2e1a 50%, #0a3a2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a2e0a 50%, #2e3a0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #2e0a0a 50%, #3a1a0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a0a2e 50%, #0a1a3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a0a1a 50%, #2e0a2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a1a2e 50%, #0a2e3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #2e1a0a 50%, #3a2e1a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a1a1a 50%, #0a2e2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a0a2e 50%, #2e0a3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #2e0a1a 50%, #3a0a2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #1a1a0a 50%, #2e2e0a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a2e1a 50%, #0a3a2e 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #0a0a2e 50%, #1a0a3a 100%)',
            'linear-gradient(135deg, #0a0a1a 0%, #2e0a0a 50%, #3a1a0a 100%)'
        ];

        function updateGradient() {
            const now = new Date();
            const hour = now.getHours();
            const gradient = gradients[hour] || gradients[0];
            document.getElementById('gradientBg').style.background = gradient;

            const timeStr = now.toLocaleTimeString('ru-RU', { hour: '2-digit', minute: '2-digit' });
            document.getElementById('timeIndicator').textContent = '⚡ ' + timeStr;
        }

        updateGradient();
        setInterval(updateGradient, 3600000);

        document.addEventListener('visibilitychange', () => {
            if (!document.hidden) updateGradient();
        });

        // =============================================================
        // 3. API НАСТРОЙКИ
        // =============================================================
        const API_KEY = '92TKXCB-6GNMBMP-J6SSQDN-3R4VVHG';
        const API_URL = 'https://api.poiskkino.dev/v1.4/movie/search';

        // =============================================================
        // 4. ЭЛЕМЕНТЫ
        // =============================================================
        const searchInput = document.getElementById('searchInput');
        const searchButton = document.getElementById('searchButton');
        const loadingSpinner = document.getElementById('loadingSpinner');
        const results = document.getElementById('results');
        const movieGrid = document.getElementById('movieGrid');
        const resultsCount = document.getElementById('resultsCount');
        const errorMessage = document.getElementById('errorMessage');
        const welcomeMessage = document.getElementById('welcomeMessage');

        // =============================================================
        // 5. ПОИСК
        // =============================================================
        async function searchMovies(query) {
            if (!query.trim()) {
                tg.showAlert('введите название фильма');
                return;
            }

            loadingSpinner.classList.add('active');
            searchButton.disabled = true;
            results.classList.remove('active');
            errorMessage.classList.remove('active');
            welcomeMessage.style.display = 'none';
            movieGrid.innerHTML = '';
            resultsCount.textContent = '';

            try {
                const url = API_URL + '?query=' + encodeURIComponent(query);
                const response = await fetch(url, {
                    method: 'GET',
                    headers: {
                        'X-API-KEY': API_KEY,
                        'Content-Type': 'application/json'
                    }
                });

                if (response.status === 401) throw new Error('неверный ключ API');
                if (response.status === 429) throw new Error('слишком много запросов');
                if (!response.ok) throw new Error('ошибка ' + response.status);

                const data = await response.json();

                if (!data.docs || data.docs.length === 0) {
                    errorMessage.classList.add('active');
                    return;
                }

                displayMovies(data.docs);

            } catch (error) {
                console.error('Ошибка:', error);
                tg.showAlert('❌ ' + error.message);
                errorMessage.classList.add('active');
            } finally {
                loadingSpinner.classList.remove('active');
                searchButton.disabled = false;
            }
        }

        // =============================================================
        // 6. ОТОБРАЖЕНИЕ
        // =============================================================
        function displayMovies(movies) {
            results.classList.add('active');
            resultsCount.textContent = movies.length + ' фильмов';

            movieGrid.innerHTML = '';

            for (let i = 0; i < movies.length; i++) {
                const movie = movies[i];
                const card = document.createElement('div');
                card.className = 'movie-card';
                card.style.animationDelay = (0.04 + i * 0.04) + 's';

                const title = movie.name || movie.alternativeName || 'без названия';
                const year = movie.year || '';
                const rating = movie.rating?.kp || movie.rating?.imdb || null;
                const genres = movie.genres?.map(function(g) { return g.name; }).slice(0, 3).join(', ') || '—';
                const countries = movie.countries?.map(function(c) { return c.name; }).slice(0, 2).join(', ') || '—';
                const description = movie.description || movie.shortDescription || '';
                const poster = movie.poster?.url || movie.poster?.previewUrl || null;
                const link = 'https://www.kinopoisk.ru/film/' + movie.id + '/';

                let ratingClass = '';
                let ratingText = '—';
                if (rating !== null) {
                    ratingText = rating.toFixed(1);
                    if (rating >= 7) ratingClass = 'high';
                    else if (rating >= 5) ratingClass = 'medium';
                    else ratingClass = 'low';
                }

                var posterHtml;
                if (poster) {
                    posterHtml = '<img class="movie-poster" src="' + poster + '" alt="' + title + '" loading="lazy" onerror="this.className=\'movie-poster placeholder\'; this.textContent=\'◈\'">';
                } else {
                    posterHtml = '<div class="movie-poster placeholder">◈</div>';
                }

                var ratingHtml = '';
                if (rating !== null) {
                    ratingHtml = '<span class="movie-rating ' + ratingClass + '">★ ' + ratingText + '</span>';
                }

                var yearHtml = year ? '<span class="year">' + year + '</span>' : '';
                var descHtml = description ? '<div class="movie-description">' + description + '</div>' : '';

                card.innerHTML = 
                    posterHtml +
                    '<div class="movie-info">' +
                        '<div>' +
                            '<div class="movie-title">' + title + ' ' + yearHtml + '</div>' +
                            '<div class="movie-meta">' +
                                '<span class="movie-meta-item">' + genres + '</span>' +
                                '<span class="movie-meta-item">' + countries + '</span>' +
                            '</div>' +
                            ratingHtml +
                            descHtml +
                        '</div>' +
                        '<a href="' + link + '" class="movie-link" target="_blank">→ кинопоиск</a>' +
                    '</div>';

                card.addEventListener('click', function(e) {
                    if (!e.target.closest('.movie-link')) {
                        tg.openLink(link);
                    }
                });

                movieGrid.appendChild(card);
            }
        }

        // =============================================================
        // 7. ОБРАБОТЧИКИ
        // =============================================================
        searchButton.addEventListener('click', function() {
            searchMovies(searchInput.value);
        });

        searchInput.addEventListener('keypress', function(e) {
            if (e.key === 'Enter') {
                searchMovies(searchInput.value);
            }
        });

        function closeApp() {
            tg.close();
        }

        console.log('✦ KINOPOISK RUS загружен ✦');
        console.log('✦ цвет обновлён: ' + new Date().toLocaleTimeString('ru-RU'));
    </script>
</body>
</html>
